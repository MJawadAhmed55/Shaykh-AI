<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0e0f">
<title>Shaykh AI — Islamic Scholar</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{
    --bg:#0b0e0f;--bg-card:#111618;--bg-panel:#151b1d;
    --gold:#c9a84c;--gold-lt:#e2c97e;--gold-dim:#7a6230;
    --green:#2e7d52;--green-br:#3dbb76;
    --txt:#e8e0d0;--txt-dim:#8a8278;--txt-muted:#5a5550;
    --border:rgba(201,168,76,0.15);--border-s:rgba(201,168,76,0.35);
    --user-bg:#162a1e;--ai-bg:#131a1c;
    /* ── FONT SIZES (medium — works on mobile & PC) ── */
    --fs-bubble: 1.05rem;
    --fs-ui:     0.88rem;
    --fs-small:  0.75rem;
    --fs-arabic: 1.35rem;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--txt);font-family:'Playfair Display',serif;display:flex;flex-direction:column;font-size:16px}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(201,168,76,0.018) 40px,rgba(201,168,76,0.018) 41px),repeating-linear-gradient(-60deg,transparent,transparent 40px,rgba(201,168,76,0.018) 40px,rgba(201,168,76,0.018) 41px)}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .login-box{background:#111618;border:1px solid var(--border-s);border-radius:18px;padding:42px 36px;max-width:420px;width:92%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,0.8)}
  .login-emblem{font-size:2.8rem;margin-bottom:10px}
  .login-arabic{font-family:'Amiri',serif;font-size:2rem;color:var(--gold);margin-bottom:10px}
  .login-title{font-size:1.5rem;font-weight:400;color:var(--gold-lt);margin-bottom:8px}
  .login-desc{font-size:0.95rem;color:var(--txt-dim);line-height:1.75;margin-bottom:28px}
  .google-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#333;border:none;border-radius:8px;padding:13px 24px;font-size:1rem;font-weight:500;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
  .google-btn:hover{background:#f5f5f5;box-shadow:0 4px 16px rgba(0,0,0,0.4);transform:translateY(-1px)}
  .google-btn img{width:20px;height:20px}
  .login-note{font-size:0.78rem;color:var(--txt-muted);margin-top:16px;line-height:1.7}

  /* LANGUAGE SCREEN */
  #lang-screen{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .lang-box{background:#111618;border:1px solid var(--border-s);border-radius:18px;padding:36px 32px;max-width:580px;width:94%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,0.8)}
  .lang-emblem{font-size:2.2rem;margin-bottom:8px}
  .lang-title{font-size:1.4rem;font-weight:400;color:var(--gold-lt);margin-bottom:6px}
  .lang-desc{font-size:0.92rem;color:var(--txt-dim);line-height:1.7;margin-bottom:22px}
  .lang-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .lang-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:10px;padding:14px 8px;cursor:pointer;transition:all .18s;text-align:center}
  .lang-card:hover{background:rgba(201,168,76,0.08);border-color:var(--gold-dim);transform:translateY(-2px)}
  .lang-card.selected{background:rgba(201,168,76,0.12);border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,0.2)}
  .lang-flag{font-size:1.7rem;margin-bottom:5px}
  .lang-name{font-size:0.88rem;color:var(--txt-dim);line-height:1.3}
  .lang-card.selected .lang-name{color:var(--gold-lt)}
  .lang-native{font-size:0.75rem;color:var(--txt-muted);margin-top:2px}
  .lang-card.selected .lang-native{color:var(--gold-dim)}
  .lang-confirm{width:100%;padding:14px;border-radius:8px;background:linear-gradient(135deg,var(--green),#1e5c38);border:1px solid rgba(61,187,118,.3);color:#fff;font-family:'Playfair Display',serif;font-size:1.1rem;cursor:pointer;transition:all .2s;letter-spacing:0.04em}
  .lang-confirm:hover{background:linear-gradient(135deg,var(--green-br),var(--green))}
  .lang-confirm:disabled{opacity:0.4;cursor:not-allowed}

  /* HEADER */
  header{z-index:10;background:linear-gradient(180deg,#0d1214,rgba(13,18,20,0.97));border-bottom:1px solid var(--border-s);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:64px;flex-shrink:0}
  .h-left{display:flex;align-items:center;gap:11px}
  .h-emblem{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--gold);background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);flex-shrink:0}
  .h-titles h1{font-size:1.15rem;font-weight:600;color:var(--gold-lt);letter-spacing:0.03em;line-height:1.1}
  .h-titles p{font-size:0.7rem;color:var(--txt-dim);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
  .h-right{display:flex;align-items:center;gap:8px}
  .status{display:inline-flex;align-items:center;gap:5px;font-size:0.68rem;color:var(--green-br);letter-spacing:0.08em;text-transform:uppercase}
  .status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green-br);box-shadow:0 0 7px var(--green-br);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .user-pill{display:flex;align-items:center;gap:7px;background:rgba(201,168,76,0.07);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;transition:all .2s}
  .user-pill:hover{background:rgba(201,168,76,0.12);border-color:var(--gold-dim)}
  .user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--gold-dim)}
  .user-name{font-size:0.78rem;color:var(--txt-dim);max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  
  /* Buttons */
  .new-btn{background:transparent;border:1px solid var(--border-s);border-radius:7px;color:var(--gold-dim);font-family:'Playfair Display',serif;font-size:0.85rem;padding:6px 13px;cursor:pointer;transition:all .2s;text-decoration:none}
  .new-btn:hover{background:rgba(201,168,76,0.08);border-color:var(--gold);color:var(--gold-lt)}
  .lang-change{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--txt-muted);font-family:'Playfair Display',serif;font-size:0.75rem;padding:5px 10px;cursor:pointer;transition:all .2s}
  .lang-change:hover{border-color:var(--gold-dim);color:var(--gold-dim)}
  #lang-indicator{font-size:0.72rem;color:var(--txt-muted);display:flex;align-items:center;gap:5px}
  #lang-indicator span{font-size:1rem}

  /* LAYOUT */
  .app-body{flex:1;display:flex;overflow:hidden;min-height:0}

  /* SIDEBAR */
  aside{width:252px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sidebar-top{padding:12px 10px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-top-label{font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--txt-muted);padding:0 4px;margin-bottom:8px}
  .t-chip{display:block;width:100%;text-align:left;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--txt-dim);font-family:'Playfair Display',serif;font-size:0.88rem;padding:8px 10px;cursor:pointer;transition:all .17s;margin-bottom:5px}
  .t-chip:hover{background:rgba(201,168,76,0.06);border-color:var(--gold-dim);color:var(--gold-lt)}
  .history-panel{flex:1;overflow-y:auto;padding:10px 10px 0}
  .history-panel::-webkit-scrollbar{width:3px}
  .history-panel::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

  /* CHAT */
  .chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  #msgs{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth}
  #msgs::-webkit-scrollbar{width:4px}
  #msgs::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}

  /* INPUT BAR */
  .input-bar{padding:14px 28px 18px;border-top:1px solid var(--border);background:linear-gradient(0,#0b0e0f 60%,transparent);flex-shrink:0}
  .input-wrap{display:flex;align-items:flex-end;gap:9px;background:var(--bg-card);border:1px solid var(--border-s);border-radius:12px;padding:10px 13px;transition:border-color .2s;max-width:860px;margin:0 auto}
  #inp{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'Playfair Display',serif;font-size:1.05rem;resize:none;max-height:130px;min-height:24px;line-height:1.65}
  #send{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--green),#1e5c38);border:1px solid rgba(61,187,118,.3);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .17s}

  @media(max-width:640px){
    aside{display:none}
    .h-titles h1{font-size:1rem}
  }
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-emblem">☪</div>
    <div class="login-arabic">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div class="login-title">Shaykh AI — Islamic Scholar</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.google.com/favicon.ico" alt="G"> Continue with Google
    </button>
  </div>
</div>

<header>
  <div class="h-left">
    <div class="h-emblem">☪</div>
    <div class="h-titles">
      <h1>Shaykh AI</h1>
      <p>Hanafi · Sunni · Shariah</p>
    </div>
  </div>
  <div class="h-right">
    <div id="lang-indicator"></div>
    <a href="quran.html" class="new-btn">📖 Quran</a>
    <a href="hadith.html" class="new-btn" style="border-color:var(--green-br); color:var(--green-br)">📜 Hadith</a>
    <button class="new-btn" onclick="newChat()">✦ New Chat</button>
    <button class="lang-change" onclick="changeLang()">🌐 Language</button>
    <div class="user-pill" onclick="signOut()">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <span class="user-name" id="user-name">User</span>
    </div>
  </div>
</header>

<div class="app-body">
  <aside>
    <div class="sidebar-top">
      <div class="sidebar-top-label">Islamic Libraries</div>
      <a href="quran.html" style="text-decoration:none"><button class="t-chip" style="color:var(--gold-lt)">📖 Open Noble Quran</button></a>
      <a href="hadith.html" style="text-decoration:none"><button class="t-chip" style="color:var(--green-br)">📜 Hadith Library</button></a>
      
      <div class="sidebar-top-label" style="margin-top:15px">Quick Topics</div>
      <button class="t-chip" onclick="ask('What are the five pillars of Islam?')">🕋 Five Pillars</button>
      <button class="t-chip" onclick="ask('Explain Salah rulings.')">🤲 Salah & Prayer</button>
      <button class="t-chip" onclick="ask('Explain Islamic Nikah rules.')">💍 Nikah & Family</button>
      <button class="t-chip" onclick="ask('Hanafi ruling on Zakat?')">💛 Zakat Rules</button>
    </div>
    <div class="history-panel">
      <div class="history-label">Chat History</div>
      <div id="history-list"></div>
    </div>
  </aside>

  <div class="chat-wrap">
    <div id="msgs">
        </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="inp" rows="1" placeholder="Ask your question…"></textarea>
        <button id="send" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
    // All your existing JavaScript functions go here (signInWithGoogle, ask, sendMsg, etc.)
    // Make sure to copy the script part from your previous version!
</script>

</body>
</html>
