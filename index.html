<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0e0f">
<title>Shaykh AI — Islamic Scholar</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{
    --bg:#0b0e0f;--bg-card:#111618;--bg-panel:#151b1d;
    --gold:#c9a84c;--gold-lt:#e2c97e;--gold-dim:#7a6230;
    --green:#2e7d52;--green-br:#3dbb76;
    --txt:#e8e0d0;--txt-dim:#8a8278;--txt-muted:#5a5550;
    --border:rgba(201,168,76,0.15);--border-s:rgba(201,168,76,0.35);
    --user-bg:#162a1e;--ai-bg:#131a1c;
    --fs-bubble: 1.05rem;
    --fs-ui:     0.88rem;
    --fs-small:  0.75rem;
    --fs-arabic: 1.35rem;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--txt);font-family:'Playfair Display',serif;display:flex;flex-direction:column;font-size:16px}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(201,168,76,0.018) 40px,rgba(201,168,76,0.018) 41px),repeating-linear-gradient(-60deg,transparent,transparent 40px,rgba(201,168,76,0.018) 40px,rgba(201,168,76,0.018) 41px)}

  /* LOGIN SCREENS */
  #login-screen, #lang-screen{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .login-box, .lang-box{background:#111618;border:1px solid var(--border-s);border-radius:18px;padding:42px 36px;max-width:420px;width:92%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,0.8)}
  .login-arabic{font-family:'Amiri',serif;font-size:2rem;color:var(--gold);margin-bottom:10px}
  .google-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#333;border:none;border-radius:8px;padding:13px 24px;font-size:1rem;font-weight:500;cursor:pointer}
  
  /* HEADER */
  header{z-index:10;background:linear-gradient(180deg,#0d1214,rgba(13,18,20,0.97));border-bottom:1px solid var(--border-s);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:64px;flex-shrink:0}
  .h-left{display:flex;align-items:center;gap:11px}
  .h-emblem{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--gold)}
  .h-titles h1{font-size:1.15rem;font-weight:600;color:var(--gold-lt)}
  .h-right{display:flex;align-items:center;gap:8px}
  .status{display:inline-flex;align-items:center;gap:5px;font-size:0.68rem;color:var(--green-br);text-transform:uppercase}
  .status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green-br);box-shadow:0 0 7px var(--green-br);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

  /* BUTTONS & UI */
  .new-btn{background:transparent;border:1px solid var(--border-s);border-radius:7px;color:var(--gold-dim);font-family:'Playfair Display',serif;font-size:0.85rem;padding:6px 13px;cursor:pointer;text-decoration:none;transition:all .2s}
  .new-btn:hover{border-color:var(--gold);color:var(--gold-lt);background:rgba(201,168,76,0.05)}
  .lang-change{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--txt-muted);font-size:0.75rem;padding:5px 10px;cursor:pointer}
  .user-pill{display:flex;align-items:center;gap:7px;background:rgba(201,168,76,0.07);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer}
  .user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--gold-dim)}
  .user-name{font-size:0.78rem;color:var(--txt-dim);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* LAYOUT */
  .app-body{flex:1;display:flex;overflow:hidden;min-height:0}
  aside{width:252px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sidebar-top{padding:12px 10px 8px;border-bottom:1px solid var(--border)}
  .sidebar-top-label{font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--txt-muted);padding:0 4px;margin-bottom:8px}
  .t-chip{display:block;width:100%;text-align:left;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--txt-dim);font-size:0.88rem;padding:8px 10px;cursor:pointer;margin-bottom:5px;transition:all .17s}
  .t-chip:hover{background:rgba(201,168,76,0.06);border-color:var(--gold-dim);color:var(--gold-lt)}

  /* CHAT AREA */
  .chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #msgs{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:18px}
  .input-bar{padding:14px 28px 18px;border-top:1px solid var(--border);background:var(--bg)}
  .input-wrap{display:flex;align-items:flex-end;gap:9px;background:var(--bg-card);border:1px solid var(--border-s);border-radius:12px;padding:10px 13px;max-width:860px;margin:0 auto}
  #inp{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:1.05rem;resize:none;min-height:24px}
  #send{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--green),#1e5c38);border:1px solid rgba(61,187,118,.3);color:#fff;cursor:pointer}

  /* RESPONSIVE */
  @media(max-width:640px){
    aside{display:none}
    .h-right .status{display:none}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-arabic">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div style="color:var(--gold-lt); margin-bottom:20px">Shaykh AI — Islamic Scholar</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.google.com/favicon.ico" width="20"> Continue with Google
    </button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="h-left">
    <div class="h-emblem">☪</div>
    <div class="h-titles">
      <h1>Shaykh AI</h1>
      <p>Hanafi · Sunni · Shariah</p>
    </div>
  </div>
  <div class="h-right">
    <div id="lang-indicator"></div>
    <div class="status">Online</div>
    
    <!-- NAVIGATION LINKS -->
    <a href="quran.html" class="new-btn">📖 Quran</a>
    <a href="hadith.html" class="new-btn" style="border-color:var(--green-br); color:var(--green-br)">📜 Hadith</a>
    
    <button class="new-btn" onclick="newChat()">✦ New Chat</button>
    <button class="lang-change" onclick="changeLang()">🌐 Language</button>
    <div class="user-pill" onclick="signOut()">
      <img class="user-avatar" id="user-avatar" src="">
      <span class="user-name" id="user-name"></span>
    </div>
  </div>
</header>

<div class="app-body">
  <aside>
    <div class="sidebar-top">
      <div class="sidebar-top-label">Islamic Libraries</div>
      <a href="quran.html" style="text-decoration:none"><button class="t-chip" style="color:var(--gold-lt)">📖 Noble Quran</button></a>
      <a href="hadith.html" style="text-decoration:none"><button class="t-chip" style="color:var(--green-br)">📜 Hadith Library</button></a>
      
      <div class="sidebar-top-label" style="margin-top:15px">Quick Topics</div>
      <button class="t-chip" onclick="ask('What are the five pillars of Islam?')">🕋 Five Pillars</button>
      <button class="t-chip" onclick="ask('How to pray Salah (Hanafi)?')">🤲 Salah Guide</button>
    </div>
  </aside>

  <div class="chat-wrap">
    <div id="msgs">
      <div style="text-align:center; padding:40px">
        <div style="font-family:'Amiri',serif; font-size:2.5rem; color:var(--gold)">بِسْمِ اللَّهِ</div>
        <h2>Welcome to Shaykh AI</h2>
        <p style="color:var(--txt-dim)">Ask anything regarding Islamic Fiqh and Shariah.</p>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="inp" rows="1" placeholder="Ask your question..."></textarea>
        <button id="send" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- AUTH & CONFIG ---
const GOOGLE_CLIENT_ID = '402537131595-rqpu96pc14naubv5lhkodh8e1n920old.apps.googleusercontent.com';
let currentUser = null;

function signInWithGoogle() {
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: window.location.origin,
    response_type: 'token',
    scope: 'openid email profile'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

async function checkLogin() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const p = await res.json();
    currentUser = { id: p.sub, name: p.name, avatar: p.picture };
    localStorage.setItem('shaykh_user', JSON.stringify(currentUser));
    window.history.replaceState({}, document.title, window.location.pathname);
  } else {
    const saved = localStorage.getItem('shaykh_user');
    if (saved) currentUser = JSON.parse(saved);
  }
  
  if (currentUser) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('user-name').textContent = currentUser.name;
    document.getElementById('user-avatar').src = currentUser.avatar;
  }
}

function signOut() {
  localStorage.removeItem('shaykh_user');
  location.reload();
}

function newChat() { location.reload(); }
function ask(q) { document.getElementById('inp').value = q; sendMsg(); }

function sendMsg() {
  const val = document.getElementById('inp').value;
  if(!val) return;
  const msgDiv = document.getElementById('msgs');
  msgDiv.innerHTML += `<div style="padding:10px; background:var(--user-bg); border-radius:8px; margin-bottom:10px">${val}</div>`;
  document.getElementById('inp').value = '';
  // Chat logic here...
}

window.onload = checkLogin;
</script>
</body>
</html>
