<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaykh AI — Scholar System</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0b0e0f;color:#eee;font-family:'Playfair Display'}
header{padding:15px;background:#111;display:flex;justify-content:space-between}
button{cursor:pointer}
.container{display:flex;height:90vh}
aside{width:250px;background:#151b1d;padding:10px;overflow:auto}
.chat{flex:1;display:flex;flex-direction:column}
#msgs{flex:1;overflow:auto;padding:20px}
.msg-user{background:#2e7d52;margin:10px;padding:10px;border-radius:10px;color:#fff;align-self:flex-end;max-width:80%}
.msg-ai{background:#111;margin:10px;padding:15px;border-radius:10px;border:1px solid #444}
.input{display:flex;padding:10px;background:#111}
textarea{flex:1;background:#000;color:#fff;border:none;padding:10px}
iframe{width:100%;height:100%;border:none}
.hidden{display:none}
</style>
</head>

<body>

<header>
  <h2>Shaykh AI</h2>
  <div>
    <button onclick="showView('chat')">Chat</button>
    <button onclick="showView('quran')">Quran</button>
    <button onclick="showView('hadith')">Hadith</button>
  </div>
</header>

<!-- PRAYER BAR -->
<div id="prayerBar" style="display:flex;justify-content:space-around;background:#111;padding:10px;font-size:12px"></div>

<div class="container">

<!-- SIDEBAR -->
<aside>
  <button onclick="newChat()">+ New Chat</button>

  <h4>Ask Quick</h4>
  <button onclick="ask('Explain Salah in Hanafi Fiqh')">Salah</button>
  <button onclick="ask('Explain Zakat rules')">Zakat</button>
  <button onclick="ask('Explain Hajj')">Hajj</button>

  <h4>History</h4>
  <div id="history"></div>
</aside>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="msgs"></div>

  <div class="input">
    <textarea id="inp"></textarea>
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- QURAN -->
<div id="quran" class="hidden">
  <iframe src="https://www.irfan-ul-quran.com/english/"></iframe>
</div>

<!-- HADITH -->
<div id="hadith" class="hidden">
  <iframe src="https://sunnah.com"></iframe>
</div>

</div>

<script>

const API = "/api/chat";

// ===== VIEW SWITCH =====
function showView(v){
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('quran').classList.add('hidden');
  document.getElementById('hadith').classList.add('hidden');
  document.getElementById(v).classList.remove('hidden');
}

// ===== NEW CHAT =====
function newChat(){
  document.getElementById('msgs').innerHTML="";
}

// ===== ASK QUICK =====
function ask(q){
  document.getElementById('inp').value=q;
  sendMsg();
}

// ===== SEND MESSAGE =====
async function sendMsg(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text) return;

  const msgs=document.getElementById('msgs');

  msgs.innerHTML+=`<div class="msg-user">${text}</div>`;
  inp.value="";

  const id="ai"+Date.now();
  msgs.innerHTML+=`<div id="${id}" class="msg-ai">Thinking...</div>`;

  // save history
  const h=document.getElementById('history');
  const item=document.createElement('div');
  item.innerText=text;
  item.onclick=()=>ask(text);
  h.prepend(item);

  try{
    const res=await fetch(API,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:[{role:"user",content:text}]
      })
    });

    const data=await res.json();
    document.getElementById(id).innerText=data.reply;

  }catch(e){
    document.getElementById(id).innerText="Server error. Check backend.";
  }

}

// ===== 12H FORMAT =====
function t12(t){
  let [h,m]=t.split(':');
  h=parseInt(h);
  let ap=h>=12?'PM':'AM';
  h=h%12||12;
  return `${h}:${m} ${ap}`;
}

// ===== PRAYER API =====
async function loadPrayer(){
  try{
    const r=await fetch('https://api.aladhan.com/v1/timingsByCity?city=Lahore&country=Pakistan&method=1&school=1');
    const d=await r.json();
    const t=d.data.timings;
    const date=d.data.date;

    document.getElementById('prayerBar').innerHTML=`
    <div>${date.hijri.day} ${date.hijri.month.en} ${date.hijri.year} AH</div>
    <div>${date.gregorian.day} ${date.gregorian.month.en}</div>
    <div>Fajr: ${t12(t.Fajr)} - ${t12(t.Sunrise)}</div>
    <div>Dhuhr: ${t12(t.Dhuhr)} - ${t12(t.Asr)}</div>
    <div>Asr: ${t12(t.Asr)} - ${t12(t.Maghrib)}</div>
    <div>Maghrib: ${t12(t.Maghrib)} - ${t12(t.Isha)}</div>
    <div>Isha: ${t12(t.Isha)} - ${t12(t.Fajr)}</div>
    `;
  }catch(e){}
}

loadPrayer();

</script>
</body>
</html>
