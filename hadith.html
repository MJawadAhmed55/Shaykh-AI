<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0e0f">
<title>Shaykh AI — Hadith Library</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e0f;--bg-card:#111618;--bg-panel:#151b1d;
    --gold:#c9a84c;--gold-lt:#e2c97e;--gold-dim:#7a6230;
    --green:#2e7d52;--green-br:#3dbb76;
    --txt:#e8e0d0;--txt-dim:#8a8278;--txt-muted:#5a5550;
    --border:rgba(201,168,76,0.15);--border-s:rgba(201,168,76,0.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:'Playfair Display',serif}
  
  header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#0d1214,rgba(13,18,20,0.98));border-bottom:1px solid var(--border-s);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:64px;backdrop-filter:blur(12px)}
  .h-left{display:flex;align-items:center;gap:11px}
  .h-emblem{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--gold)}
  .h-titles h1{font-size:1.1rem;font-weight:600;color:var(--gold-lt)}
  .h-titles p{font-size:0.65rem;color:var(--txt-dim);text-transform:uppercase}
  .back-btn{background:transparent;border:1px solid var(--border-s);border-radius:7px;color:var(--gold-dim);font-size:0.85rem;padding:6px 13px;cursor:pointer;text-decoration:none}

  .container{max-width:900px;margin:0 auto;padding:28px 20px}

  /* Daily Featured Hadith */
  .daily-box{background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(17,22,24,1));border:1px solid var(--border-s);border-radius:15px;padding:25px;margin-bottom:30px;text-align:center}
  .daily-label{font-size:0.7rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:15px;display:block}

  /* Controls */
  .controls{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;margin-bottom:22px;align-items:end}
  select,input{width:100%;background:#0d1214;border:1px solid var(--border-s);border-radius:8px;color:var(--txt);padding:10px 13px;outline:none;font-family:inherit}
  .load-btn{padding:11px 20px;border-radius:8px;background:linear-gradient(135deg,var(--green),#1e5c38);border:1px solid rgba(61,187,118,.3);color:#fff;cursor:pointer}

  /* Hadith Cards */
  .hadith-card{background:var(--bg-card);border-bottom:1px solid var(--border);padding:25px 15px;margin-bottom:15px;border-radius:12px}
  .hadith-meta{font-size:0.75rem;color:var(--gold-dim);margin-bottom:12px;text-transform:uppercase}
  .hadith-arabic{font-family:'Amiri',serif;font-size:1.6rem;color:var(--txt);text-align:right;direction:rtl;line-height:2;margin-bottom:15px}
  .hadith-urdu{font-family:'Amiri',serif;font-size:1.2rem;color:var(--gold-lt);text-align:right;direction:rtl;line-height:1.8;margin-bottom:10px;border-right:2px solid var(--gold-dim);padding-right:12px}
  .hadith-english{font-size:0.95rem;color:var(--txt-dim);line-height:1.6;border-left:2px solid var(--green);padding-left:12px}
  
  .status-tag{display:inline-block;margin-top:15px;font-size:0.65rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
  .Sahih{color:var(--green-br);border-color:var(--green)}
  
  .loading-spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s infinite linear;margin:20px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:600px){.controls{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="h-emblem">📜</div>
    <div class="h-titles">
      <h1>Hadith Library</h1>
      <p>Kutub al-Sittah Collections</p>
    </div>
  </div>
  <a href="index.html" class="back-btn">← Quran</a>
</header>

<div class="container">
  <div class="daily-box" id="daily-hadith">
    <span class="daily-label">Hadith of the Moment</span>
    <div id="daily-loader" class="loading-spinner"></div>
    <div id="daily-content"></div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label style="font-size:0.7rem; color:var(--txt-muted)">COLLECTION</label>
      <select id="book-select">
        <option value="sahih-bukhari">Sahih al-Bukhari</option>
        <option value="sahih-muslim">Sahih Muslim</option>
        <option value="sunan-abu-dawood">Sunan Abu Dawood</option>
        <option value="jami-at-tirmidhi">Jami' at-Tirmidhi</option>
        <option value="sunan-an-nasai">Sunan an-Nasa'i</option>
        <option value="sunan-ibn-majah">Sunan Ibn Majah</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label style="font-size:0.7rem; color:var(--txt-muted)">TOPIC / KEYWORD</label>
      <input type="text" id="search-inp" placeholder="e.g. Iman, Prayer, Charity">
    </div>
    <button class="load-btn" onclick="searchHadith()">🔍 Search</button>
  </div>

  <div id="results-loader" class="loading-spinner" style="display:none"></div>
  <div id="hadith-results"></div>
</div>

<script>
const API_KEY = "$2y$10$vXdQiQAUCNlvrhPZeYewERiKpHb71FQEJlVfEyhBpgwYh9h5Y";

// Load Random on Start
window.onload = () => fetchRandom();

async function fetchRandom() {
    const num = Math.floor(Math.random() * 500) + 1;
    try {
        const res = await fetch(`https://hadithapi.com/api/hadiths?apiKey=${API_KEY}&hadithNumber=${num}&book=sahih-bukhari`);
        const data = await res.json();
        const h = data.hadiths.data[0];
        document.getElementById('daily-loader').style.display = 'none';
        document.getElementById('daily-content').innerHTML = `
            <div class="hadith-arabic" style="font-size:1.3rem">${h.hadithArabic}</div>
            <div class="hadith-english">${h.hadithEnglish}</div>
            <p style="font-size:0.7rem; margin-top:10px; color:var(--gold-dim)">— Bukhari: ${h.hadithNumber}</p>
        `;
    } catch(e) { document.getElementById('daily-hadith').style.display='none'; }
}

async function searchHadith() {
    const book = document.getElementById('book-select').value;
    const q = document.getElementById('search-inp').value;
    const resDiv = document.getElementById('hadith-results');
    const loader = document.getElementById('results-loader');

    resDiv.innerHTML = "";
    loader.style.display = "block";

    try {
        const response = await fetch(`https://hadithapi.com/api/hadiths?apiKey=${API_KEY}&book=${book}&paginate=15${q ? '&searchText='+q : ''}`);
        const data = await response.json();
        loader.style.display = "none";

        if(data.hadiths && data.hadiths.data.length > 0) {
            data.hadiths.data.forEach(h => {
                resDiv.innerHTML += `
                    <div class="hadith-card">
                        <div class="hadith-meta">${h.bookName} | Hadith ${h.hadithNumber}</div>
                        <div class="hadith-arabic">${h.hadithArabic}</div>
                        <div class="hadith-urdu">${h.hadithUrdu || ''}</div>
                        <div class="hadith-english">${h.hadithEnglish || ''}</div>
                        <div class="status-tag ${h.status}">${h.status}</div>
                    </div>`;
            });
        } else {
            resDiv.innerHTML = "<p style='text-align:center; padding:20px; color:var(--txt-muted)'>No Hadith found for this search.</p>";
        }
    } catch(e) {
        loader.style.display = "none";
        resDiv.innerHTML = "<p style='color:red'>Connection Error</p>";
    }
}
</script>
</body>
</html>
